apiVersion: apps/v1
kind: Deployment
metadata:
  name: flavorfusion-frontend
  namespace: food-delivery
  labels:
    app: flavorfusion
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flavorfusion
      tier: frontend
  template:
    metadata:
      labels:
        app: flavorfusion
        tier: frontend
    spec:
      containers:
      - name: frontend
        image: flavorfusion/frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        env:
        - name: REACT_APP_API_URL
          value: "http://backend-service:5000"
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 20
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: food-delivery
spec:
  selector:
    app: flavorfusion
    tier: frontend
  ports:
  - port: 80
    targetPort: 80
    name: http
  type: ClusterIP
