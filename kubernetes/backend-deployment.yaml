apiVersion: apps/v1
kind: Deployment
metadata:
  name: flavorfusion-backend
  namespace: food-delivery
  labels:
    app: flavorfusion
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: flavorfusion
      tier: backend
  template:
    metadata:
      labels:
        app: flavorfusion
        tier: backend
    spec:
      containers:
      - name: backend
        image: flavorfusion/backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
          name: http
        env:
        - name: PORT
          value: "5000"
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: mongodb-secret
              key: uri
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: food-delivery
spec:
  selector:
    app: flavorfusion
    tier: backend
  ports:
  - port: 5000
    targetPort: 5000
    name: http
  type: ClusterIP
